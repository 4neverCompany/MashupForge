# Tauri desktop release pipeline
# Triggers on git tag push matching v* (e.g. v1.0.0, v0.9.49)
# Builds signed Windows NSIS installer and uploads to GitHub Release
name: Release Desktop

on:
  push:
    tags:
      - 'v*'

# Don't cancel a release build if it gets a new tag mid-run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # Required to create a GitHub Release

jobs:
  # ── Step 1: Build the Next.js standalone output ────────────────────────
  build-web:
    name: Build Next.js standalone
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install
        run: |
          bun install --frozen-lockfile 2>/dev/null || npm ci

      - name: Build (Next.js standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}

      - name: Copy standalone output to src-tauri/frontend-stub
        run: |
          # Tauri's frontendDist points to ../src-tauri/frontend-stub
          # The Next.js standalone build goes there for the prod bundle.
          # MUST WIPE any prior contents first — if a previous failed
          # run left a `node_modules` dir here, Tauri's frontendDist
          # validator rejects the whole bundle with:
          #   "The configured frontendDist includes the
          #    ['node_modules'] folder. Please isolate your web
          #    assets on a separate folder and update
          #    tauri.conf.json > build > frontendDist."
          rm -rf src-tauri/frontend-stub
          mkdir -p src-tauri/frontend-stub
          cp -r .next/standalone/. src-tauri/frontend-stub/
          # Strip the node_modules that Next.js standalone ships —
          # Tauri's bundler chokes on it. The standalone server
          # doesn't need node_modules at runtime (deps are inlined).
          rm -rf src-tauri/frontend-stub/node_modules
          cp -r .next/static src-tauri/frontend-stub/.next/static
          cp -r public src-tauri/frontend-stub/public 2>/dev/null || true

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-standalone
          path: src-tauri/frontend-stub/
          retention-days: 7

  # ── Step 2: Build signed Windows NSIS installer ──────────────────────
  build-windows:
    name: Build Tauri (Windows NSIS)
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install Node deps
        shell: bash
        run: bun install --frozen-lockfile || npm ci

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-standalone
          path: src-tauri/frontend-stub/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # MUSTFIX-001: use `bunx` (Bun's bin resolver) because Bun does
      # not populate node_modules/.bin the way npm does, so `npx tauri`
      # fails with "could not determine executable to run" when Bun did
      # the install step above. continue-on-error so a real tauri build
      # failure (not a CLI resolution issue) drops to the npm fallback.
      - name: Build Tauri (NSIS, signed, Bun)
        id: tauri_bun
        continue-on-error: true
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bunx tauri build

      # MUSTFIX-001: npm fallback. Reinstall with npm so node_modules
      # has the .bin shims `npx` needs, then retry the Tauri build.
      - name: Build Tauri (NSIS, signed, npm fallback)
        if: steps.tauri_bun.outcome == 'failure'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "::warning::Bun-driven Tauri build failed (tauri_bun=${{ steps.tauri_bun.outcome }}). Reinstalling with npm and retrying."
          npm ci
          npx tauri build

      - name: Find installer artifacts
        id: find
        shell: bash
        run: |
          # Locate the produced .msi / .exe / .nsis files
          find src-tauri/target -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.nsis' -o -name 'latest.json' \) > artifacts.txt
          {
            echo "artifacts<<EOF"
            cat artifacts.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/**/*.msi
            src-tauri/target/**/*.exe
            src-tauri/target/**/*.nsis
            src-tauri/target/**/latest.json
          retention-days: 30

  # ── Step 3: Publish GitHub Release with all artifacts ────────────────
  publish-release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true  # Release as draft first; you promote manually after sanity-checking
          generate_release_notes: true
          files: |
            release-assets/*
          body: |
            ## MashupForge ${{ github.ref_name }}

            Auto-generated release notes below. Edit before promoting the draft.

            ---

            ### Verification

            - [ ] SHA-256 checksums of all installers match
            - [ ] Tauri updater signature verified
            - [ ] `latest.json` is well-formed and points to the correct asset URLs
            - [ ] Installer runs clean on a fresh Windows VM
            - [ ] Auto-update from the previous version works

            Once all four are checked, promote the draft.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
