name: Secret Scan (gitleaks)

# V107-CI: prevent future secret leaks. Runs gitleaks on every push and PR.
# On detection: fails the build + posts the finding as a workflow annotation.
# Catches GitHub PATs, AWS keys, OpenAI keys, generic high-entropy strings.
#
# The HANDOFF.md commit fcb30d3 caught a hardcoded GitHub PAT in
# docs/working-folder/scripts/ that should never have been committed. The
# scripts have been rewritten to read GITHUB_TOKEN from env. This workflow
# is the preventive layer going forward.
#
# Companion to the gitleaks pre-commit hook in .githooks/pre-commit
# (installed by simple-git-hooks on `bun install`).

on:
  push:
    branches: [main, 'release/*', 'feature/*', 'fix/*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for leaked secrets
    # Dependabot-triggered runs get NO repository/org secrets, so
    # GITLEAKS_LICENSE is empty there and gitleaks-action fails before
    # scanning — every dependabot PR showed a guaranteed-red check
    # (observed on #13–#41, 2026-06-11). Manifest bumps have nothing to
    # secret-scan anyway; human/agent PRs and pushes keep full coverage.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so we catch secrets that were committed and later
          # deleted in the same branch.
          fetch-depth: 0

      - name: Run gitleaks
        # BUG-FIX-2026-06-04: gitleaks/gitleaks-action requires a
        # `GITLEAKS_LICENSE` secret when scanning repos that belong
        # to an organization (the README's wording: "required for
        # organizations, not required for user accounts"). The previous
        # `Code4neverCompany` was a personal account, so it ran
        # license-free. The new `4neverCompany` is an org, so the
        # action now fails the run before scanning.
        #
        # Three options to restore full scanning:
        #   1. Get a free license at gitleaks.io and store it as the
        #      GITLEAKS_LICENSE secret on the 4neverCompany org.
        #   2. Migrate the repo back to a personal account (revert
        #      the org conversion — destructive).
        #   3. Use a different scanner (trufflehog, git-secrets, etc.)
        #      that doesn't have a license gate.
        #
        # Until then the workflow still RUNS and reports findings as
        # a workflow check (visible in the PR's checks tab), but
        # branch protection no longer requires it. The pre-commit
        # hook (.githooks/pre-commit) provides the actual secret-
        # prevention at commit time, with a prefix-grep fallback
        # when the gitleaks binary isn't installed.
        uses: gitleaks/gitleaks-action@v2
        env:
          # Public gitleaks rules detect GitHub PATs (ghp_/gho_/ghs_/ghr_/
          # ghu_ prefixes), AWS keys (AKIA prefix), generic high-entropy
          # strings, and a long tail of provider-specific tokens. The
          # built-in ruleset is good enough — no custom config needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The license gate (no-op until set). See comment above.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # Post-scan cleanup: if gitleaks found something, log the path
      # to the report artifact. The action uploads `gitleaks.sarif` as
      # a workflow artifact automatically; this step just makes it
      # obvious where to look.
      - name: Annotate results
        if: failure()
        run: |
          echo "::error::gitleaks found potential secrets. Check the SARIF artifact in this run for details."
          echo "To run locally: bunx gitleaks detect --source . --no-banner"
          exit 1
