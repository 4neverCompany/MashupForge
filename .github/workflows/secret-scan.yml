name: Secret Scan (gitleaks)

# V107-CI: prevent future secret leaks. Runs gitleaks on every push and PR.
# On detection: fails the build + posts the finding as a workflow annotation.
# Catches GitHub PATs, AWS keys, OpenAI keys, generic high-entropy strings.
#
# The HANDOFF.md commit fcb30d3 caught a hardcoded GitHub PAT in
# docs/working-folder/scripts/ that should never have been committed. The
# scripts have been rewritten to read GITHUB_TOKEN from env. This workflow
# is the preventive layer going forward.
#
# Companion to the gitleaks pre-commit hook in .githooks/pre-commit
# (installed by simple-git-hooks on `bun install`).

on:
  push:
    branches: [main, 'release/*', 'feature/*', 'fix/*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we catch secrets that were committed and later
          # deleted in the same branch.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Public gitleaks rules detect GitHub PATs (ghp_/gho_/ghs_/ghr_/
          # ghu_ prefixes), AWS keys (AKIA prefix), generic high-entropy
          # strings, and a long tail of provider-specific tokens. The
          # built-in ruleset is good enough — no custom config needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-scan cleanup: if gitleaks found something, log the path
      # to the report artifact. The action uploads `gitleaks.sarif` as
      # a workflow artifact automatically; this step just makes it
      # obvious where to look.
      - name: Annotate results
        if: failure()
        run: |
          echo "::error::gitleaks found potential secrets. Check the SARIF artifact in this run for details."
          echo "To run locally: bunx gitleaks detect --source . --no-banner"
          exit 1
