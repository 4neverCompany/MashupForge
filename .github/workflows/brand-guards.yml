# Brand / version / lockfile guard checks
# Runs on every PR to enforce the §2 batch rules:
#   1. Brand name consistency (no "ai-studio-applet" or "Multiverse Mashup Studio")
#   2. Version sync (package.json, Cargo.toml, tauri.conf.json)
#   3. bun.lock is newer than package-lock.json
#   4. No `as any` in src/
name: Brand & Version Guards

on:
  pull_request:
    branches: [main, 'release/*']
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brand-name:
    name: Brand name consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden legacy brand names
        run: |
          # Forbidden patterns from §1.2 of the analysis
          FORBIDDEN=(
            "ai-studio-applet"
            "Multiverse Mashup Studio"
            "Multiverse Mashup"
            "Remix: Remix"
          )

          # Allow these files to mention the legacy names (changelog history, etc.)
          # .github/workflows/brand-guards.yml is allowed because this file MUST list
          # the forbidden patterns as data; the brand-guards job would otherwise
          # self-match. BRAND.md is allowed because it documents the forbidden names
          # for contributors without using them in any runtime surface.
          # .hermes/ is the in-house AI agent runtime (sub-agents, memory files)
          # and contains historical project-naming references that have nothing
          # to do with runtime surface — the same way .claude/ is excluded.
          #
          # The leading `(\./)?` accounts for the `./` prefix that `grep -r .` adds
          # to relative paths — without it, none of these paths would actually
          # match and the guard would always fail.
          ALLOWLIST_REGEX='^(\./)?(CHANGELOG\.md|README\.md|docs/|app/landing/|app/components/landing/|\.github/workflows/brand-guards\.yml|BRAND\.md|\.hermes/)'

          FAILED=0
          for PATTERN in "${FORBIDDEN[@]}"; do
            HITS=$(grep -rEn --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=target --exclude-dir=.git "$PATTERN" . 2>/dev/null \
              | grep -Ev "$ALLOWLIST_REGEX" || true)
            if [ -n "$HITS" ]; then
              echo "❌ Found forbidden legacy brand name: $PATTERN"
              echo "$HITS"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "These files still reference the old product names."
            echo "Use 'MashupForge' consistently. See §1.2 of the project analysis."
            exit 1
          fi
          echo "✅ Brand name consistency OK"

  version-sync:
    name: Version sync (package.json / Cargo.toml / tauri.conf.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and compare versions
        run: |
          # Read versions from the three sources
          PKG_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(grep -E '^version\s*=' src-tauri/Cargo.toml | head -1 | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")

          echo "package.json:     $PKG_VERSION"
          echo "Cargo.toml:       $CARGO_VERSION"
          echo "tauri.conf.json:  $TAURI_VERSION"

          if [ "$PKG_VERSION" != "$CARGO_VERSION" ] || [ "$PKG_VERSION" != "$TAURI_VERSION" ]; then
            echo ""
            echo "❌ Version mismatch across manifests."
            echo "All three files must declare the same version. See §1.1 of the project analysis."
            exit 1
          fi
          echo "✅ Version sync OK"

  lockfile-freshness:
    name: bun.lock freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bun.lock vs package-lock.json
        run: |
          if [ ! -f bun.lock ]; then
            echo "❌ bun.lock missing. The project is bun-primary; bun.lock must be committed."
            exit 1
          fi

          if [ ! -f package-lock.json ]; then
            echo "⚠️ package-lock.json missing. That's expected if bun has always worked — OK."
            exit 0
          fi

          BUN_MTIME=$(stat -c %Y bun.lock)
          NPM_MTIME=$(stat -c %Y package-lock.json)

          if [ "$BUN_MTIME" -lt "$NPM_MTIME" ]; then
            echo "❌ package-lock.json is newer than bun.lock."
            echo "Someone ran 'npm install' without retrying 'bun install'."
            echo "Run: bun install && git add bun.lock"
            exit 1
          fi

          echo "✅ bun.lock is fresh (or newer than package-lock.json)"

  no-any:
    name: No `as any` in src/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Search for as any casts
        run: |
          # Match the actual TypeScript cast pattern: "as any" followed by
          # something that is NOT a JavaScript identifier character (so we don't
          # match `as anything`, `as anyone`, etc.). This is a PCRE lookahead
          # (only available with `grep -P`, not `-E`).
          #
          # Then drop lines where the only "as any" match is inside a comment
          # (single-line //, or after a /* block-comment start on the same line).
          # The pre-fix regex matched "as any" anywhere on a line, which caused
          # false positives on explanatory comments like "// avoids `as any`".
          HITS=$(grep -rPn '\bas\s+any\b(?![A-Za-z0-9_])' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=target \
            app/ components/ lib/ hooks/ types/ 2>/dev/null || true)

          # Drop lines where "as any" only appears inside a comment.
          # Match either `//` (single-line) or `/*` (block-start) at the start
          # of the code portion of the line (after the `path:line:` prefix).
          REAL_HITS=$(echo "$HITS" | grep -Ev '^[^:]+:[0-9]+:\s*(//|\*)' || true)

          if [ -n "$REAL_HITS" ]; then
            echo "❌ Found 'as any' casts in src/. CONTRIBUTING.md says no any — use 'unknown' and narrow."
            echo "$REAL_HITS"
            echo ""
            echo "If a cast is genuinely necessary, add an ESLint disable comment with a justification."
            exit 1
          fi
          echo "✅ No 'as any' casts in src/"
